<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>z9nai GmbH</title>
  <script>
    // GitHub Pages SPA fix: redirect path-based routes to hash-based routes
    // e.g. /preise → /#preise, /code-of-conduct → /#code-of-conduct
    var path = window.location.pathname;
    if (path && path !== '/') {
      window.location.replace('/#' + path.replace(/^\//, '').replace(/\/$/, ''));
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
